<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>免付費離線翻頁電子書</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
    <style>
        body {
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #flipbook {
            width: 800px;
            height: 500px;
        }
        #flipbook .page {
            width: 400px;
            height: 500px;
            background-color: white;
        }
        #flipbook img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

<div id="flipbook">
    <div class="page"><img src="1.jpg"></div>
    <div class="page"><img src="2.jpg"></div>
    <div class="page"><img src="3.jpg"></div>
    <div class="page"><img src="4.jpg"></div>
    <div class="page"><img src="5.jpg"></div>
    <div class="page"><img src="6.jpg"></div>
    <div class="page"><img src="7.jpg"></div>
</div>

<script>
    $(document).ready(function() {
        // 初始化翻頁
        $("#flipbook").turn({
            width: 800,
            height: 500,
            autoCenter: true,
            duration: 1000
        });
    });
</script>

</body>
</html>
