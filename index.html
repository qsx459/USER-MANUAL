<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USER MANUAL</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #333;
            overflow: hidden;
        }
        .wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* 調整為符合手冊形狀的尺寸：直式單頁 400x550，雙頁合併為 800x550 */
        #flipbook {
            width: 800px;
            height: 550px;
            visibility: hidden; /* 防止未載入前排版崩壞 */
        }
        #flipbook .page {
            width: 400px;
            height: 550px;
            background-color: #fff;
        }
        #flipbook img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div id="flipbook">
        <div class="page"><img src="1.jpg"></div>
        <div class="page"><img src="2.jpg"></div>
        <div class="page"><img src="3.jpg"></div>
        <div class="page"><img src="4.jpg"></div>
        <div class="page"><img src="5.jpg"></div>
        <div class="page"><img src="6.jpg"></div>
        <div class="page"><img src="7.jpg"></div>
    </div>
</div>

<script>
    // 確保所有圖片都載入完成後，才啟動翻頁，避免寬高計算錯誤
    $(window).on('load', function() {
        $('#flipbook').css('visibility', 'visible');
        $('#flipbook').turn({
            width: 800,
            height: 550,
            autoCenter: true,
            duration: 800,
            acceleration: true
        });
    });
</script>

</body>
</html>
